# https://developers.home-assistant.io/docs/apps/configuration#app-configuration
name: WhatsApp MCP
version: "1.0.1"
slug: whatsapp_mcp
description: MCP server for your personal WhatsApp account, backed by the WhatsApp web multidevice bridge
url: "https://github.com/10bn/whatsapp-mcp-hass-addon"
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: services
boot: auto
map:
  - share:rw
ports:
  8081/tcp: 8081
ports_description:
  8081/tcp: WhatsApp MCP server (streamable-http). Set the mcp_auth_token option before exposing this port beyond localhost.
options:
  mcp_auth_token: ""
schema:
  mcp_auth_token: "password?"
