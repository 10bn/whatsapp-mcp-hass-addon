configuration:
  mcp_auth_token:
    name: MCP auth token
    description: >-
      Bearer token that MCP clients must send as "Authorization: Bearer <token>"
      to use the WhatsApp MCP server. Strongly recommended - without it, anyone
      who can reach this app's port on your network can read and send WhatsApp
      messages through it. Leave empty only if you fully trust your network.
network:
  8081/tcp: MCP server (streamable-http)
